<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신청 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; -webkit-font-smoothing: antialiased; }
    .badge-pending  { background:#fef3c7; color:#92400e; }
    .badge-done     { background:#d1fae5; color:#065f46; }
    .badge-canceled { background:#fee2e2; color:#991b1b; }
  </style>
</head>
<body class="bg-neutral-50 min-h-screen">

<!-- ── 로그인 화면 ── -->
<div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-sm border border-neutral-200 p-10 w-full max-w-sm">
    <h1 class="text-xl font-bold tracking-tight mb-1">관리자 로그인</h1>
    <p class="text-neutral-400 text-sm mb-8">신청 내역 관리 페이지</p>
    <form onsubmit="doLogin(event)">
      <div class="mb-4">
        <label class="block text-xs font-semibold text-neutral-500 mb-1.5">비밀번호</label>
        <input id="pw-input" type="password" placeholder="비밀번호 입력"
          class="w-full border border-neutral-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-black focus:ring-2 focus:ring-black/10 transition"
          required>
      </div>
      <button type="submit"
        class="w-full bg-black text-white font-semibold rounded-xl py-3 text-sm hover:bg-neutral-800 active:scale-95 transition">
        로그인
      </button>
      <p id="login-error" class="text-red-500 text-xs mt-3 text-center hidden">비밀번호가 틀렸습니다.</p>
    </form>
  </div>
</div>

<!-- ── 관리자 대시보드 ── -->
<div id="dashboard" class="hidden">

  <!-- 헤더 -->
  <header class="bg-white border-b border-neutral-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <span class="font-bold text-sm tracking-tight">📋 신청 관리자</span>
      <div class="flex items-center gap-4">
        <button onclick="loadData()" class="text-xs text-neutral-500 hover:text-black transition">새로고침</button>
        <button onclick="doLogout()" class="text-xs bg-neutral-100 hover:bg-neutral-200 px-3 py-1.5 rounded-lg transition">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">

    <!-- 통계 카드 -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-2xl border border-neutral-200 p-5">
        <p class="text-xs text-neutral-400 font-medium mb-1">전체 신청</p>
        <p id="stat-total" class="text-3xl font-black tracking-tight">-</p>
      </div>
      <div class="bg-white rounded-2xl border border-neutral-200 p-5">
        <p class="text-xs text-neutral-400 font-medium mb-1">오늘 신청</p>
        <p id="stat-today" class="text-3xl font-black tracking-tight">-</p>
      </div>
      <div class="bg-white rounded-2xl border border-neutral-200 p-5">
        <p class="text-xs text-neutral-400 font-medium mb-1">대기중</p>
        <p id="stat-pending" class="text-3xl font-black tracking-tight text-amber-600">-</p>
      </div>
      <div class="bg-white rounded-2xl border border-neutral-200 p-5">
        <p class="text-xs text-neutral-400 font-medium mb-1">완료</p>
        <p id="stat-done" class="text-3xl font-black tracking-tight text-emerald-600">-</p>
      </div>
    </div>

    <!-- 필터 -->
    <div class="flex flex-wrap gap-2 mb-5">
      <button onclick="setFilter('all')"     class="filter-btn active text-xs px-3 py-1.5 rounded-lg border font-medium transition" data-filter="all">전체</button>
      <button onclick="setFilter('pending')" class="filter-btn text-xs px-3 py-1.5 rounded-lg border font-medium transition" data-filter="pending">대기중</button>
      <button onclick="setFilter('done')"    class="filter-btn text-xs px-3 py-1.5 rounded-lg border font-medium transition" data-filter="done">완료</button>
    </div>

    <!-- 테이블 -->
    <div class="bg-white rounded-2xl border border-neutral-200 overflow-hidden">
      <div id="loading" class="p-12 text-center text-neutral-400 text-sm">불러오는 중...</div>
      <div id="empty" class="hidden p-12 text-center text-neutral-400 text-sm">신청 내역이 없습니다.</div>

      <!-- 데스크탑 테이블 -->
      <table id="data-table" class="hidden w-full text-sm">
        <thead class="border-b border-neutral-100">
          <tr class="text-left text-xs text-neutral-400 font-semibold uppercase tracking-wider">
            <th class="px-6 py-3">이름</th>
            <th class="px-6 py-3">연락처</th>
            <th class="px-6 py-3">업종</th>
            <th class="px-6 py-3">고민</th>
            <th class="px-6 py-3">접수일</th>
            <th class="px-6 py-3">상태</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>

      <!-- 모바일 카드 -->
      <div id="card-list" class="hidden divide-y divide-neutral-100"></div>
    </div>

  </main>
</div>

<!-- 상세 모달 -->
<div id="detail-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeDetail()"></div>
  <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-md p-7 z-10">
    <div class="flex items-center justify-between mb-5">
      <h3 class="font-bold text-base">신청 상세</h3>
      <button onclick="closeDetail()" class="text-neutral-400 hover:text-black text-xl leading-none">✕</button>
    </div>
    <div id="detail-content" class="space-y-4 text-sm"></div>
    <div id="detail-actions" class="mt-6 flex gap-2"></div>
  </div>
</div>

<style>
  .filter-btn { background: #fff; border-color: #e5e5e5; color: #666; }
  .filter-btn.active { background: #000; border-color: #000; color: #fff; }
  tbody tr:hover { background: #fafafa; }
</style>

<script>
// ── 설정 ──
const SUPABASE_URL  = 'https://eqwbhkhrhquiesqkvmsd.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_cRHcDa9mRDGhDXmTAaTFeQ_SJ9aXiAd';
const ADMIN_PASSWORD = 'marketing2026'; // ← 변경하세요

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let allData = [];
let currentFilter = 'all';
let currentDetail = null;

// ── 로그인 ──
function doLogin(e) {
  e.preventDefault();
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadData();
  } else {
    document.getElementById('login-error').classList.remove('hidden');
  }
}

function doLogout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

// ── 데이터 로드 ──
async function loadData() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('data-table').classList.add('hidden');
  document.getElementById('card-list').classList.add('hidden');
  document.getElementById('empty').classList.add('hidden');

  const { data, error } = await db
    .from('consultations')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) { alert('데이터 로드 실패: ' + error.message); return; }

  allData = data || [];
  updateStats();
  renderTable();
  document.getElementById('loading').classList.add('hidden');
}

// ── 통계 ──
function updateStats() {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('stat-total').textContent   = allData.length;
  document.getElementById('stat-today').textContent   = allData.filter(r => r.created_at.startsWith(today)).length;
  document.getElementById('stat-pending').textContent = allData.filter(r => r.status === 'pending').length;
  document.getElementById('stat-done').textContent    = allData.filter(r => r.status === 'done').length;
}

// ── 필터 ──
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === f);
  });
  renderTable();
}

function filtered() {
  if (currentFilter === 'all') return allData;
  return allData.filter(r => r.status === currentFilter);
}

// ── 렌더링 ──
function statusBadge(s) {
  const map = { pending: ['대기중', 'badge-pending'], done: ['완료', 'badge-done'], canceled: ['취소', 'badge-canceled'] };
  const [label, cls] = map[s] || [s, 'bg-neutral-100 text-neutral-600'];
  return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold ${cls}">${label}</span>`;
}

function formatDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function renderTable() {
  const rows = filtered();
  if (rows.length === 0) {
    document.getElementById('empty').classList.remove('hidden');
    document.getElementById('data-table').classList.add('hidden');
    document.getElementById('card-list').classList.add('hidden');
    return;
  }

  // 데스크탑
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = rows.map(r => `
    <tr class="border-b border-neutral-100 cursor-pointer" onclick="openDetail('${r.id}')">
      <td class="px-6 py-4 font-medium">${r.name}</td>
      <td class="px-6 py-4 text-neutral-600">${r.phone}</td>
      <td class="px-6 py-4 text-neutral-600">${r.business}</td>
      <td class="px-6 py-4 text-neutral-400 max-w-xs truncate">${r.situation || '-'}</td>
      <td class="px-6 py-4 text-neutral-400 text-xs">${formatDate(r.created_at)}</td>
      <td class="px-6 py-4">${statusBadge(r.status)}</td>
    </tr>
  `).join('');
  document.getElementById('data-table').classList.remove('hidden');

  // 모바일
  const cardList = document.getElementById('card-list');
  cardList.innerHTML = rows.map(r => `
    <div class="p-5 cursor-pointer hover:bg-neutral-50 transition" onclick="openDetail('${r.id}')">
      <div class="flex items-start justify-between mb-1">
        <span class="font-semibold">${r.name}</span>
        ${statusBadge(r.status)}
      </div>
      <p class="text-neutral-500 text-xs mb-1">${r.phone} · ${r.business}</p>
      <p class="text-neutral-400 text-xs">${formatDate(r.created_at)}</p>
      ${r.situation ? `<p class="text-neutral-600 text-xs mt-2 line-clamp-2">${r.situation}</p>` : ''}
    </div>
  `).join('');
  document.getElementById('card-list').classList.remove('hidden');
}

// ── 상세 모달 ──
function openDetail(id) {
  currentDetail = allData.find(r => r.id === id);
  if (!currentDetail) return;
  const r = currentDetail;

  document.getElementById('detail-content').innerHTML = `
    <div class="grid grid-cols-2 gap-3">
      <div><p class="text-xs text-neutral-400 mb-0.5">이름</p><p class="font-semibold">${r.name}</p></div>
      <div><p class="text-xs text-neutral-400 mb-0.5">연락처</p><p class="font-semibold">${r.phone}</p></div>
      <div><p class="text-xs text-neutral-400 mb-0.5">업종</p><p class="font-semibold">${r.business}</p></div>
      <div><p class="text-xs text-neutral-400 mb-0.5">상태</p>${statusBadge(r.status)}</div>
    </div>
    <div>
      <p class="text-xs text-neutral-400 mb-0.5">접수일</p>
      <p class="font-medium">${formatDate(r.created_at)}</p>
    </div>
    ${r.situation ? `
    <div>
      <p class="text-xs text-neutral-400 mb-0.5">마케팅 고민</p>
      <p class="text-neutral-700 leading-relaxed">${r.situation}</p>
    </div>` : ''}
  `;

  const actions = document.getElementById('detail-actions');
  actions.innerHTML = '';
  if (r.status === 'pending') {
    actions.innerHTML = `
      <button onclick="updateStatus('done')" class="flex-1 bg-black text-white text-sm font-semibold rounded-xl py-2.5 hover:bg-neutral-800 transition">✓ 완료 처리</button>
      <button onclick="updateStatus('canceled')" class="flex-1 bg-neutral-100 text-neutral-600 text-sm font-semibold rounded-xl py-2.5 hover:bg-neutral-200 transition">취소</button>
    `;
  } else if (r.status === 'done') {
    actions.innerHTML = `
      <button onclick="updateStatus('pending')" class="flex-1 bg-neutral-100 text-neutral-700 text-sm font-semibold rounded-xl py-2.5 hover:bg-neutral-200 transition">대기중으로 되돌리기</button>
    `;
  }

  document.getElementById('detail-modal').classList.remove('hidden');
}

function closeDetail() {
  document.getElementById('detail-modal').classList.add('hidden');
  currentDetail = null;
}

async function updateStatus(newStatus) {
  if (!currentDetail) return;
  const { error } = await db
    .from('consultations')
    .update({ status: newStatus })
    .eq('id', currentDetail.id);

  if (error) { alert('업데이트 실패: ' + error.message); return; }

  currentDetail.status = newStatus;
  const idx = allData.findIndex(r => r.id === currentDetail.id);
  if (idx !== -1) allData[idx].status = newStatus;

  updateStats();
  renderTable();
  closeDetail();
}

// ── 반응형 ──
function checkViewport() {
  const isMobile = window.innerWidth < 768;
  document.getElementById('data-table').style.display = isMobile ? 'none' : '';
  document.getElementById('card-list').style.display  = isMobile ? '' : 'none';
}
window.addEventListener('resize', checkViewport);

// ── 초기화 ──
if (sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  loadData();
}
</script>
</body>
</html>
